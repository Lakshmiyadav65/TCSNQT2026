<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn with Lakshmi | TCS NQT & Competitive Prep</title>
    <meta name="description"
        content="Ultimate preparation platform for TCS NQT and other placement exams. 1000+ questions with detailed solutions and tips.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-text">Learn with Lakshmi</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-category="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-item" data-category="scenario">
                    <span class="nav-icon">🧩</span>
                    <span class="nav-label">Scenario Based <span class="nav-badge pulse">NEW</span></span>
                </button>
                <button class="nav-item" data-category="input-guide">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">Input Guide</span>
                </button>
                <button class="nav-item" data-category="input-practice">
                    <span class="nav-icon">⚡</span>
                    <span class="nav-label">Input Practice <span class="nav-badge pulse">HOT</span></span>
                </button>
                <div class="nav-divider">SHORTCUTS</div>
                <a href="shortcuts-practice.html" target="_blank" class="nav-item" style="text-decoration:none; display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1rem; border-radius:10px; transition:background 0.2s; color:inherit;">
                    <span class="nav-icon">⏱️</span>
                    <span class="nav-label">Shortcuts Practice <span class="nav-badge pulse">NEW</span></span>
                </a>
                <div class="nav-divider">LATEST</div>
                <button class="nav-item" data-category="practice">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">Mock Tests Aptitude</span>
                </button>
                <div class="nav-divider">CATEGORIES</div>
                <button class="nav-item" data-category="numerical">
                    <span class="nav-icon">🔢</span>
                    <span class="nav-label">Numerical</span>
                </button>
                <button class="nav-item" data-category="verbal">
                    <span class="nav-icon">🗣️</span>
                    <span class="nav-label">Verbal</span>
                </button>
                <button class="nav-item" data-category="reasoning">
                    <span class="nav-icon">🧠</span>
                    <span class="nav-label">Reasoning</span>
                </button>
                <button class="nav-item" data-category="programming">
                    <span class="nav-icon">💻</span>
                    <span class="nav-label">Programming MCQ</span>
                </button>
                <button class="nav-item" data-category="coding">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Coding Challenges</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">P</div>
                    <div class="user-details">
                        <span class="user-name">Hey friend,</span>
                        <span class="user-status">Wishing you all the best!</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="question-search" placeholder="Search for questions, topics, or concepts...">
                </div>
                <div class="top-bar-actions">
                    <button class="icon-btn" id="theme-toggle">🌙</button>
                    <div class="session-timer" id="session-timer">00:00:00</div>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Content will be dynamically injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Preparing your success path...</p>
                </div>
            </div>
        </main>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <!-- Desktop Recommendation Pop-up -->
        <div id="desktop-recommendation" class="device-popup-overlay">
            <div class="device-popup">
                <div class="popup-icon">🚀</div>
                <div class="popup-content">
                    <h2>Better on Desktop</h2>
                    <p>For the most immersive coding experience and precise layout, we recommend using a <strong>laptop or desktop</strong>.</p>
                    <button class="btn btn-primary" id="close-banner">Got it, thanks!</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="dashboard-template">
        <div class="dashboard">
            <section class="welcome-banner">
                <div class="banner-content">
                    <h1>Hey welcome, <span class="highlight">future engineer</span>!</h1>
                    <p>You have access to 1000+ hand-picked questions for TCS NQT. Let's start practicing.</p>
                </div>
                <div class="banner-stat">
                    <div class="stat-circle">
                        <span class="stat-value">1000+</span>
                        <span class="stat-label">Questions</span>
                    </div>
                </div>
            </section>

            <div class="alert-banner" data-category="scenario">
                <div class="alert-icon">🔥</div>
                <div class="alert-text">
                    <strong>Latest Update:</strong> New Scenario-Based Questions are now live! Master the latest patterns.
                </div>
                <div class="alert-action">Check Now →</div>
            </div>

            <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
                <div class="stat-card color-1">
                    <h3>Overall Progress</h3>
                    <div class="progress-container">
                        <div class="progress-bar" id="overall-progress" style="width: 0%"></div>
                    </div>
                    <p><span id="answered-count">0</span> / 1000 Completed</p>
                </div>
                <div class="stat-card color-2">
                    <h3>Accuracy</h3>
                    <div class="accuracy-value">0%</div>
                    <p>Keep improving!</p>
                </div>
            </div>

            <section class="category-cards">
                <h2>Quick Shortcuts</h2>
                <div class="cards-grid">
                    <div class="shortcut-card color-guide" data-category="input-guide" style="grid-column: span 2;">
                        <div class="card-icon">📖</div>
                        <h4>Input Guide</h4>
                        <p>Master TCS NQT Input Patterns (Highly Recommended)</p>
                    </div>
                    
                    <div class="shortcut-card color-guide" onclick="window.open('shortcuts-practice.html','_blank')" style="grid-column: span 2; background: linear-gradient(135deg, #2D3748 0%, #1A202C 100%); border: 1px solid rgba(255,255,255,0.1); cursor:pointer;">
                        <div class="card-badge pulse" style="background: #EAB308;">NEW</div>
                        <div class="card-icon" style="background: rgba(234, 179, 8, 0.2); color: #EAB308;">⏱️</div>
                        <h4>Shortcuts Practice</h4>
                        <p>Practice specific previous year memory-based questions from TCS NQT!</p>
                    </div>

                    <div class="shortcut-card" data-category="practice">
                        <div class="card-icon">📝</div>
                        <h4>Mock Tests Aptitude</h4>
                        <p>10 Practice Papers</p>
                    </div>
                    <div class="shortcut-card" data-category="numerical">
                        <div class="card-icon">🔢</div>
                        <h4>Numerical</h4>
                        <p>200 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="verbal">
                        <div class="card-icon">🗣️</div>
                        <h4>Verbal</h4>
                        <p>200 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="reasoning">
                        <div class="card-icon">🧠</div>
                        <h4>Reasoning</h4>
                        <p>200 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="programming">
                        <div class="card-icon">💻</div>
                        <h4>Programming</h4>
                        <p>250 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="coding">
                        <div class="card-icon">⚙️</div>
                        <h4>Coding</h4>
                        <p>150 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="scenario">
                        <div class="card-badge pulse">NEW</div>
                        <div class="card-icon">🧩</div>
                        <h4>Scenario Based</h4>
                        <p>Latest Questions</p>
                    </div>
                </div>
            </section>
        </div>
    </template>

    <script src="app.js?v=4"></script>
</body>

</html>
