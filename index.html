<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI with Lakshmi | TCS NQT & Competitive Prep</title>
    <meta name="description"
        content="Ultimate preparation platform for TCS NQT and other placement exams by Lakshmi. 800+ questions with detailed solutions and tips.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-text">AI with Lakshmi</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-category="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </button>
                <div class="nav-divider">CATEGORIES</div>
                <button class="nav-item" data-category="numerical">
                    <span class="nav-icon">🔢</span>
                    <span class="nav-label">Numerical</span>
                </button>
                <button class="nav-item" data-category="verbal">
                    <span class="nav-icon">🗣️</span>
                    <span class="nav-label">Verbal</span>
                </button>
                <button class="nav-item" data-category="reasoning">
                    <span class="nav-icon">🧠</span>
                    <span class="nav-label">Reasoning</span>
                </button>
                <button class="nav-item" data-category="programming">
                    <span class="nav-icon">💻</span>
                    <span class="nav-label">Programming MCQ</span>
                </button>
                <button class="nav-item" data-category="coding">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Coding Challenges</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">L</div>
                    <div class="user-details">
                        <span class="user-name">Lakshmi</span>
                        <span class="user-status">Preparing for Success</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="question-search" placeholder="Search for questions, topics, or concepts...">
                </div>
                <div class="top-bar-actions">
                    <button class="icon-btn" id="theme-toggle">🌙</button>
                    <div class="session-timer" id="session-timer">00:00:00</div>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Content will be dynamically injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Preparing your success path...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Templates -->
    <template id="dashboard-template">
        <div class="dashboard">
            <section class="welcome-banner">
                <div class="banner-content">
                    <h1>Welcome back, <span class="highlight">Lakshmi</span>!</h1>
                    <p>You have access to 800+ hand-picked questions for TCS NQT. Let's start practicing.</p>
                </div>
                <div class="banner-stat">
                    <div class="stat-circle">
                        <span class="stat-value">800+</span>
                        <span class="stat-label">Questions</span>
                    </div>
                </div>
            </section>

            <div class="stats-grid">
                <div class="stat-card color-1">
                    <h3>Overall Progress</h3>
                    <div class="progress-container">
                        <div class="progress-bar" id="overall-progress" style="width: 0%"></div>
                    </div>
                    <p><span id="answered-count">0</span> / 803 Completed</p>
                </div>
                <div class="stat-card color-2">
                    <h3>Accuracy</h3>
                    <div class="accuracy-value">0%</div>
                    <p>Keep improving!</p>
                </div>
                <div class="stat-card color-3">
                    <h3>Top Category</h3>
                    <div class="top-cat">N/A</div>
                    <p>Based on performance</p>
                </div>
            </div>

            <section class="category-cards">
                <h2>Quick Shortcuts</h2>
                <div class="cards-grid">
                    <div class="shortcut-card" data-category="numerical">
                        <div class="card-icon">🔢</div>
                        <h4>Numerical</h4>
                        <p>200 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="verbal">
                        <div class="card-icon">🗣️</div>
                        <h4>Verbal</h4>
                        <p>203 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="reasoning">
                        <div class="card-icon">🧠</div>
                        <h4>Reasoning</h4>
                        <p>200 Questions</p>
                    </div>
                    <div class="shortcut-card" data-category="coding">
                        <div class="card-icon">⚙️</div>
                        <h4>Coding</h4>
                        <p>100 Questions</p>
                    </div>
                </div>
            </section>
        </div>
    </template>

    <script src="app.js"></script>
</body>

</html>
